name: tally
description: "Personal finance tracker with automatic Revolut sync."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # Secure storage (Plaid tokens)
  flutter_secure_storage: ^9.2.4

  # Local persistence
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5

  # Formatting
  intl: ^0.20.2

  # Charts
  fl_chart: ^0.70.2

  # URL launcher
  url_launcher: ^6.3.1
  app_links: ^6.4.0

  # Plaid Link SDK (iOS/Android natif)
  plaid_flutter: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
